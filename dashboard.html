<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kim Yaptı? — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f0e0c;--surface:#1a1916;--surface2:#242220;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#f0ede8;--text2:#9a9590;--text3:#5a5550;
  --accent:#e85d26;--yellow:#f5c842;--green:#4ade80;--blue:#60a5fa;--purple:#a78bfa;
}
html,body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;min-height:100vh;}
.wrap{max-width:960px;margin:0 auto;padding:32px 20px 80px;}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:12px;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-mark{width:40px;height:40px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#fff;transform:rotate(-3deg);}
.logo-text{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;}
.logo-sub{font-size:12px;color:var(--text3);}
.live-badge{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--green);font-weight:500;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.last-update{font-size:11px;color:var(--text3);}

/* GRID */
.grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px;}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:12px;margin-bottom:20px;}

/* CARDS */
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:16px;padding:20px;}
.card-title{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;}
.big-num{font-family:'DM Mono',monospace;font-size:40px;font-weight:500;line-height:1;margin-bottom:4px;}
.num-sub{font-size:12px;color:var(--text2);}
.trend{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:500;margin-top:6px;padding:2px 8px;border-radius:99px;}
.trend-up{background:rgba(74,222,128,0.12);color:var(--green);}
.trend-neutral{background:rgba(255,255,255,0.06);color:var(--text2);}

/* LIVE TABLE */
.live-table{width:100%;border-collapse:collapse;}
.live-table th{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:0.06em;padding:8px 12px;text-align:left;border-bottom:0.5px solid var(--border);}
.live-table td{font-size:13px;padding:10px 12px;border-bottom:0.5px solid var(--border);color:var(--text);}
.live-table tr:last-child td{border-bottom:none;}
.live-table tr:hover td{background:var(--surface2);}
.phase-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;}
.phase-waiting{background:rgba(245,200,66,0.15);color:var(--yellow);}
.phase-answering{background:rgba(96,165,250,0.15);color:var(--blue);}
.phase-voting{background:rgba(167,139,250,0.15);color:var(--purple);}
.phase-reveal{background:rgba(74,222,128,0.15);color:var(--green);}
.phase-scores{background:rgba(232,93,38,0.15);color:var(--accent);}

/* BAR CHART */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.bar-label{font-size:13px;color:var(--text);min-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-wrap{flex:1;height:8px;background:var(--surface2);border-radius:99px;overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;transition:width 0.6s ease;}
.bar-val{font-family:'DM Mono',monospace;font-size:12px;color:var(--text2);min-width:28px;text-align:right;}

/* EMPTY */
.empty{text-align:center;padding:32px;color:var(--text3);font-size:14px;}
.empty-icon{font-size:28px;margin-bottom:8px;}

/* REFRESH */
.refresh-btn{background:none;border:0.5px solid var(--border2);border-radius:8px;color:var(--text2);font-size:12px;font-family:'Instrument Sans',sans-serif;padding:6px 12px;cursor:pointer;transition:all 0.15s;}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent);}

.section-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:12px;}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="logo">
      <div class="logo-mark">KY</div>
      <div>
        <div class="logo-text">Kim Yaptı?</div>
        <div class="logo-sub">Admin Dashboard</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
      <div class="live-badge"><div class="live-dot"></div>Canlı</div>
      <div class="last-update" id="last-update">—</div>
      <button class="refresh-btn" onclick="loadData()">↻ Yenile</button>
    </div>
  </div>

  <!-- KPI CARDS -->
  <div class="grid-4">
    <div class="card">
      <div class="card-title">Anlık Aktif Oyunlar</div>
      <div class="big-num" id="kpi-active" style="color:var(--green);">—</div>
      <div class="num-sub">Şu an devam eden</div>
    </div>
    <div class="card">
      <div class="card-title">Anlık Oyuncu</div>
      <div class="big-num" id="kpi-players" style="color:var(--blue);">—</div>
      <div class="num-sub">Tüm aktif odalarda</div>
    </div>
    <div class="card">
      <div class="card-title">Toplam Oyun</div>
      <div class="big-num" id="kpi-total" style="color:var(--yellow);">—</div>
      <div class="num-sub">Tüm zamanlar</div>
    </div>
    <div class="card">
      <div class="card-title">Ort. Grup Büyüklüğü</div>
      <div class="big-num" id="kpi-avg" style="color:var(--purple);">—</div>
      <div class="num-sub">Kişi / oyun</div>
    </div>
  </div>

  <div class="grid-2">
    <!-- CANLI ODALAR -->
    <div class="card">
      <div class="section-title">Canlı Odalar</div>
      <div id="live-rooms-wrap">
        <div class="empty"><div class="empty-icon">🎮</div>Yükleniyor...</div>
      </div>
    </div>

    <!-- KATEGORİ DAĞILIMI -->
    <div class="card">
      <div class="section-title">Kategori Popülerliği</div>
      <div id="cat-chart">
        <div class="empty"><div class="empty-icon">📊</div>Yükleniyor...</div>
      </div>
    </div>
  </div>

  <!-- GRUP BÜYÜKLÜĞÜ DAĞILIMI -->
  <div class="card">
    <div class="section-title">Grup Büyüklüğü Dağılımı</div>
    <div id="group-chart">
      <div class="empty"><div class="empty-icon">👥</div>Yükleniyor...</div>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, get }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDVMluxSSW5S_DsWVhbHNWEAYCp_pgQ_EU",
  authDomain: "kim-yapti.firebaseapp.com",
  databaseURL: "https://kim-yapti-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kim-yapti",
  storageBucket: "kim-yapti.firebasestorage.app",
  messagingSenderId: "607954213481",
  appId: "1:607954213481:web:2e37ddd3dcd7d54743a0f8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const CAT_NAMES = {
  genel: 'Genel 🎯',
  derin: 'Derin & Duygusal 🌊',
  utandirici: 'Utandırıcı 😳',
  bel_alti: 'Bel Altı 🔥',
  serbest: 'Serbest 🎲',
};

const CAT_COLORS = {
  genel: '#e85d26',
  derin: '#60a5fa',
  utandirici: '#c084fc',
  bel_alti: '#f87171',
  serbest: '#4ade80',
};

const PHASE_LABELS = {
  waiting: 'Bekleniyor',
  answering: 'Cevap yazılıyor',
  voting: 'Oylanıyor',
  reveal: 'Sonuçlar',
  scores: 'Bitti',
};

function fmt(n){ return n===undefined||n===null?'—':n.toLocaleString('tr-TR'); }
function timeAgo(ts){
  if(!ts) return '—';
  const d = Date.now()-ts;
  if(d<60000) return Math.floor(d/1000)+'s önce';
  if(d<3600000) return Math.floor(d/60000)+'dk önce';
  return Math.floor(d/3600000)+'sa önce';
}

window.loadData = async function(){
  document.getElementById('last-update').textContent = 'Güncelleniyor...';
  const snap = await get(ref(db,'rooms'));
  const rooms = snap.val() || {};
  renderDashboard(rooms);
  document.getElementById('last-update').textContent =
    'Son güncelleme: ' + new Date().toLocaleTimeString('tr-TR');
};

function renderDashboard(rooms){
  const entries = Object.entries(rooms);
  const activePhases = ['waiting','answering','voting','reveal'];

  const ONE_HOUR = 60 * 60 * 1000;
  const now = Date.now();

  // Aktif odalar: son 1 saatte açılmış VE henüz bitmemiş
  const active = entries.filter(([,r])=>
    activePhases.includes(r.phase) &&
    r.createdAt && (now - r.createdAt) < ONE_HOUR
  );
  const totalPlayers = active.reduce((s,[,r])=>s+Object.keys(r.players||{}).length,0);
  const allPlayerCounts = entries.map(([,r])=>Object.keys(r.players||{}).length).filter(n=>n>0);
  const avgGroup = allPlayerCounts.length
    ? (allPlayerCounts.reduce((a,b)=>a+b,0)/allPlayerCounts.length).toFixed(1)
    : '—';

  document.getElementById('kpi-active').textContent = fmt(active.length);
  document.getElementById('kpi-players').textContent = fmt(totalPlayers);
  document.getElementById('kpi-total').textContent = fmt(entries.length);
  document.getElementById('kpi-avg').textContent = avgGroup;

  // Canlı odalar tablosu
  const liveWrap = document.getElementById('live-rooms-wrap');
  if(active.length===0){
    liveWrap.innerHTML='<div class="empty"><div class="empty-icon">💤</div>Şu an aktif oda yok</div>';
  } else {
    liveWrap.innerHTML=`<table class="live-table">
      <thead><tr>
        <th>Kod</th><th>Oyuncular</th><th>Durum</th><th>Soru</th><th>Açılış</th>
      </tr></thead>
      <tbody>${active.map(([code,r])=>{
        const pCount = Object.keys(r.players||{}).length;
        const phase = r.phase||'—';
        const qIdx = (r.currentQ||0)+1;
        const qTotal = (r.questions||[]).length;
        const phaseClass = 'phase-'+(phase==='answering'?'answering':phase==='voting'?'voting':phase==='reveal'?'reveal':phase==='scores'?'scores':'waiting');
        return `<tr>
          <td><span style="font-family:'DM Mono',monospace;font-weight:500;color:var(--yellow);">${code}</span></td>
          <td>${pCount} kişi</td>
          <td><span class="phase-badge ${phaseClass}">${PHASE_LABELS[phase]||phase}</span></td>
          <td style="color:var(--text2);">${qIdx}/${qTotal}</td>
          <td style="color:var(--text3);">${timeAgo(r.createdAt)}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
  }

  // Kategori popülerliği — sorulardan kategorileri tahmin et
  const catCounts = {};
  entries.forEach(([,r])=>{
    // Oyunun sorularını kategorilerle eşleştir
    (r.questions||[]).forEach(q=>{
      // Hangi kategoriye ait olduğunu bulmak için basit eşleşme
      // (Gerçekte kategori ID'sini room'a kaydetmek daha iyi olurdu)
    });
    // Alternatif: questions array uzunluğuna göre tahmin
    const pCount = Object.keys(r.players||{}).length;
    if(pCount>=2) catCounts['oyun'] = (catCounts['oyun']||0)+1;
  });

  // Grup büyüklüğü dağılımı
  const groupDist = {};
  entries.forEach(([,r])=>{
    const n = Object.keys(r.players||{}).length;
    if(n>=2){
      const key = n>=7 ? '7+' : String(n);
      groupDist[key]=(groupDist[key]||0)+1;
    }
  });

  const groupWrap = document.getElementById('group-chart');
  const groupEntries = Object.entries(groupDist).sort((a,b)=>parseInt(a[0])-parseInt(b[0]));
  const maxG = Math.max(...groupEntries.map(([,v])=>v),1);
  if(groupEntries.length===0){
    groupWrap.innerHTML='<div class="empty"><div class="empty-icon">👥</div>Henüz veri yok</div>';
  } else {
    const colors=['#60a5fa','#4ade80','#f5c842','#e85d26','#a78bfa','#f87171'];
    groupWrap.innerHTML=groupEntries.map(([k,v],i)=>`
      <div class="bar-row">
        <div class="bar-label">${k} kişilik grup</div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(v/maxG*100)}%;background:${colors[i%colors.length]};"></div></div>
        <div class="bar-val">${v}</div>
      </div>`).join('');
  }

  // Kategori chart — categories seçimini room'a eklemediğimiz için
  // soru sayısından dağılım gösteriyoruz
  const catWrap = document.getElementById('cat-chart');
  const qLengths = {'1-3 soru':0,'4-6 soru':0,'7-10 soru':0};
  entries.forEach(([,r])=>{
    const n=(r.questions||[]).length;
    if(n<=3) qLengths['1-3 soru']++;
    else if(n<=6) qLengths['4-6 soru']++;
    else qLengths['7-10 soru']++;
  });
  const maxQ = Math.max(...Object.values(qLengths),1);
  const qColors=['#4ade80','#60a5fa','#a78bfa'];
  catWrap.innerHTML = entries.length===0
    ? '<div class="empty"><div class="empty-icon">📊</div>Henüz veri yok</div>'
    : Object.entries(qLengths).map(([k,v],i)=>`
      <div class="bar-row">
        <div class="bar-label">${k}</div>
        <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(v/maxQ*100)}%;background:${qColors[i]};"></div></div>
        <div class="bar-val">${v}</div>
      </div>`).join('');
}

// Sayfa açılınca yükle, her 30 saniyede otomatik yenile
loadData();
setInterval(loadData, 30000);

// Realtime listener — odalar değişince anında güncelle
onValue(ref(db,'rooms'), snap=>{
  renderDashboard(snap.val()||{});
  document.getElementById('last-update').textContent =
    'Son güncelleme: '+new Date().toLocaleTimeString('tr-TR');
});
</script>
</body>
</html>
